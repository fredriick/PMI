name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --appendonly yes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Verify format
        run: if [ "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))" ]; then echo "Go files need formatting:"; gofmt -d $(find . -name '*.go' -not -path './.git/*'); exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit, no Redis)
        run: |
          REDIS_ADDR=localhost:6379 go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
        env:
          REDIS_ADDR: localhost:6379

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go${{ matrix.go-version }}
          path: coverage.out

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download coverage from test job
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-artifacts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        continue-on-error: true
        with:
          version: latest
          only-new-issues: true
          args: --timeout=5m
