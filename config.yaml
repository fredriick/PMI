gateway:
  host: "0.0.0.0"
  port: 8000
  mtls_enabled: true
  circuit_breaker_threshold: 5
  rate_limit_requests: 100
  rate_limit_window_seconds: 60

matchmaker:
  host: "localhost"
  port: 6379
  pool_size: 10

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

compliance:
  blocked_domains:
    - "*.gov"
    - "*.mil"
    - "*.bankofamerica.com"
    - "*.chase.com"
    - "*.wellsfargo.com"
    - "*.illegal-content.*"
  kyc_required: true

peer:
  min_battery_percent: 20
  max_cpu_percent: 80
  require_unmetered_wifi: true
