apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proxymesh-redis-data
  namespace: proxymesh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxymesh-redis
  namespace: proxymesh
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: proxymesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: proxymesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: proxymesh
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxymesh-secrets
                  key: redis-password
          command:
            - /bin/sh
            - -c
            - redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: proxymesh-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: proxymesh-redis
  namespace: proxymesh
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: proxymesh
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: proxymesh
  ports:
    - name: redis
      port: 6379
      targetPort: redis
