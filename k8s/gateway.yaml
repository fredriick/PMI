apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxymesh-gateway
  namespace: proxymesh
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: proxymesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/part-of: proxymesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: proxymesh
    spec:
      containers:
        - name: gateway
          image: ghcr.io/fredriick/proxymesh:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 9000
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxymesh-secrets
                  key: redis-password
            - name: MTLS_ENABLED
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tls
              mountPath: /etc/proxymesh/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: proxymesh-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls
          secret:
            secretName: proxymesh-tls
