apiVersion: v1
kind: Service
metadata:
  name: proxymesh-gateway
  namespace: proxymesh
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: proxymesh
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: proxymesh
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 9000
      targetPort: grpc
